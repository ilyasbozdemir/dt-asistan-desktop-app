name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync version with tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm pkg set version=$VERSION

      - name: Install dependencies
        run: npm install
        env:
          npm_config_msvs_version: "2022"

      - name: Verify ee-first
        shell: cmd
        run: |
          npm ls ee-first
          if exist node_modules\ee-first (
            echo FOUND
          ) else (
            echo MISSING
            exit 1
          )

      - name: Build and Package
        run: npm run build && npx electron-builder --win --x64 -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Release Notes
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == *"beta"* || "${{ github.ref_name }}" == *"alpha"* ]]; then
            echo "RELEASE_NAME=dt-asistan-desktop-app ${{ github.ref_name }} (Erken Erişim)" >> $GITHUB_ENV
            echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
            echo "Doğrudan Temin Masaüstü Yönetim uygulaması sürümü. 🚀" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            echo "**Erken Erişim Sürümü (Early Access)**" >> $GITHUB_ENV
            echo "Bu sürüm erken erişim aşamasında olup tüm temel fonksiyonları içermektedir." >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "RELEASE_NAME=dt-asistan-desktop-app ${{ github.ref_name }}" >> $GITHUB_ENV
            echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
            echo "Doğrudan Temin Masaüstü Yönetim uygulaması sürümü." >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Release Files
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.yml
          draft: false
          prerelease: false
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_BODY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
